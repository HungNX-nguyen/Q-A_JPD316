<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Question</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f2f2f7;
    }

    h2 {
      text-align: center;
      font-size: 22px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      background: #007aff;
      color: white;
    }

    button:active {
      opacity: 0.7;
    }

    .danger {
      background: #ff3b30;
    }

    #result {
      margin-top: 20px;
      padding: 16px;
      background: white;
      border-radius: 12px;
      font-size: 18px;
      min-height: 60px;
    }

    #listContainer {
      margin-top: 20px;
      background: white;
      border-radius: 12px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    li {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 15px;
    }

    li:active {
      background: #f0f0f0;
    }
  </style>
</head>

<body>

<h2>🎯 Random Câu Hỏi</h2>

<textarea id="questionList" placeholder="Nhập mỗi câu 1 dòng..."></textarea>

<div class="button-group">
  <button onclick="start()">▶ Bắt đầu</button>
  <button onclick="nextAndSpeak()">🎲 Câu tiếp</button>
  <button onclick="speak()">🔊 Đọc</button>
  <button onclick="toggleList()">📋 Danh sách</button>
  <button class="danger" onclick="clearAll()">🗑 Xóa</button>
</div>

<div id="result">Câu hỏi sẽ hiện ở đây</div>

<div id="listContainer" style="display:none;">
  <ul id="questionListView"></ul>
</div>

<script>
let shuffled = [];
let index = 0;
let currentQuestion = "";

// load
window.onload = function () {
  const saved = localStorage.getItem("questions");
  if (saved) {
    document.getElementById("questionList").value = saved;
  }
};

// save
document.getElementById("questionList").addEventListener("input", function () {
  localStorage.setItem("questions", this.value);
});

// shuffle
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function start() {
  const text = document.getElementById("questionList").value;
  const questions = text.split("\n").filter(q => q.trim() !== "");

  if (questions.length === 0) {
    alert("Nhập câu hỏi trước!");
    return;
  }

  shuffled = [...questions];
  shuffle(shuffled);
  index = 0;

  showQuestion();
}

function nextAndSpeak() {
  if (shuffled.length === 0) {
    alert("Bấm 'Bắt đầu' trước!");
    return;
  }

  index++;

  if (index >= shuffled.length) {
    alert("Hết câu → shuffle lại");
    start();
    return;
  }

  showQuestion();
  speak(); // gọi trong click → iPhone OK
}

function showQuestion() {
  currentQuestion = shuffled[index];
  document.getElementById("result").innerText = currentQuestion;
}

function speak() {
  if (!currentQuestion) return;

  const utterance = new SpeechSynthesisUtterance(currentQuestion);
  utterance.lang = "ja-JP";

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function toggleList() {
  const container = document.getElementById("listContainer");

  if (container.style.display === "none") {
    container.style.display = "block";
    renderList();
  } else {
    container.style.display = "none";
  }
}

function renderList() {
  const text = localStorage.getItem("questions") || "";
  const questions = text.split("\n").filter(q => q.trim() !== "");

  const ul = document.getElementById("questionListView");
  ul.innerHTML = "";

  questions.forEach((q, i) => {
    const li = document.createElement("li");
    li.textContent = (i + 1) + ". " + q;

    li.onclick = () => {
      currentQuestion = q;
      document.getElementById("result").innerText = q;
      speak();
    };

    ul.appendChild(li);
  });
}

function clearAll() {
  if (!confirm("Xóa toàn bộ?")) return;

  localStorage.removeItem("questions");
  document.getElementById("questionList").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("questionListView").innerHTML = "";

  shuffled = [];
  index = 0;
  currentQuestion = "";
}
</script>

</body>
</html>
