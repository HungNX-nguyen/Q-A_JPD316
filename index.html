<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Question</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f2f2f7;
    }

    h2 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #007aff;
      color: white;
    }

    .danger {
      background: #ff3b30;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 10px;
      font-size: 18px;
      min-height: 60px;
    }

    #listContainer {
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    li {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

<h2>🎯 Random Câu Hỏi</h2>

<textarea id="questionList" placeholder="Nhập mỗi câu 1 dòng..."></textarea>

<div class="grid">
  <button onclick="start()">▶ Start</button>
  <button onclick="nextAndSpeak()">🎲 Next</button>
  <button onclick="speak()">🔊 Speak</button>
  <button onclick="toggleList()">📋 List</button>
  <button class="danger" onclick="clearAll()">🗑 Clear</button>
</div>

<div id="result"></div>

<div id="listContainer" style="display:none;">
  <ul id="questionListView"></ul>
</div>

<script>
let shuffled = [];
let index = 0;
let currentQuestion = "";

// load localStorage
window.onload = () => {
  const saved = localStorage.getItem("questions");
  if (saved) document.getElementById("questionList").value = saved;
};

// auto save
document.getElementById("questionList").addEventListener("input", function () {
  localStorage.setItem("questions", this.value);
});

// shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// start
function start() {
  const text = document.getElementById("questionList").value;
  const questions = text.split("\n").filter(q => q.trim());

  if (!questions.length) {
    alert("Nhập câu hỏi trước!");
    return;
  }

  shuffled = [...questions];
  shuffle(shuffled);
  index = 0;

  showQuestion();
}

// next + speak (IMPORTANT for iPhone)
function nextAndSpeak() {
  if (!shuffled.length) {
    alert("Bấm Start trước!");
    return;
  }

  index++;

  if (index >= shuffled.length) {
    alert("Hết câu → shuffle lại");
    start();
    return;
  }

  showQuestion();
  speak(); // MUST be inside click
}

// show
function showQuestion() {
  currentQuestion = shuffled[index];
  document.getElementById("result").innerText = currentQuestion;
}

// 🔥 FIX iPhone TTS
function speak() {
  if (!currentQuestion) return;

  const utterance = new SpeechSynthesisUtterance(currentQuestion);
  utterance.lang = "ja-JP";

  function loadVoicesAndSpeak() {
    const voices = speechSynthesis.getVoices();

    if (!voices.length) {
      setTimeout(loadVoicesAndSpeak, 100);
      return;
    }

    const voice =
      voices.find(v => v.lang === "ja-JP") ||
      voices.find(v => v.lang.startsWith("ja")) ||
      voices[0];

    if (voice) utterance.voice = voice;

    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }

  loadVoicesAndSpeak();
}

// list
function toggleList() {
  const box = document.getElementById("listContainer");
  box.style.display = box.style.display === "none" ? "block" : "none";
  renderList();
}

function renderList() {
  const text = localStorage.getItem("questions") || "";
  const questions = text.split("\n").filter(q => q.trim());

  const ul = document.getElementById("questionListView");
  ul.innerHTML = "";

  questions.forEach((q, i) => {
    const li = document.createElement("li");
    li.textContent = (i + 1) + ". " + q;

    li.onclick = () => {
      currentQuestion = q;
      document.getElementById("result").innerText = q;
      speak();
    };

    ul.appendChild(li);
  });
}

// clear
function clearAll() {
  if (!confirm("Xóa hết?")) return;

  localStorage.removeItem("questions");
  document.getElementById("questionList").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("questionListView").innerHTML = "";

  shuffled = [];
  index = 0;
  currentQuestion = "";
}
</script>

</body>
</html>
